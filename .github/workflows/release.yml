# =============================================================================
# GitHub Actions: Release Automático do CorporateWallpaperAgent
# =============================================================================
# Dispara ao criar uma tag no formato v*.*.* (ex: v2.0.0)
# Compila o C# no Windows, monta o ZIP de distribuição e cria o Release no GitHub.
# =============================================================================

name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Extrair versão da tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Versão detectada: $version"

      - name: Verificar arquivos do pacote
        shell: pwsh
        run: |
          $required = @(
            'WallpaperAgent.ps1',
            'WallpaperLauncher.vbs',
            'Install.bat',
            'Uninstall.bat',
            'README.md'
          )
          $missing = $required | Where-Object { -not (Test-Path $_) }
          if ($missing) {
            Write-Error "Arquivos ausentes: $($missing -join ', ')"
            exit 1
          }
          foreach ($f in $required) {
            $file = Get-Item $f
            Write-Host "OK: $($file.Name) ($($file.Length) bytes)"
          }

      - name: Montar pacote de distribuicao (ZIP)
        shell: pwsh
        run: |
          $distDir = "dist"
          New-Item -ItemType Directory -Path $distDir -Force | Out-Null

          # Renomeia o Install.bat para nome amigavel ao colaborador
          Copy-Item "WallpaperAgent.ps1" -Destination $distDir
          Copy-Item "WallpaperLauncher.vbs" -Destination $distDir
          Copy-Item "Install.bat" -Destination "$distDir\CLIQUE AQUI PARA INSTALAR.bat"
          Copy-Item "Uninstall.bat" -Destination $distDir
          Copy-Item "WallpaperDiagnostic.ps1" -Destination $distDir
          Copy-Item "Diagnostico.bat" -Destination $distDir
          Copy-Item "README.md" -Destination $distDir

          # config.txt NAO e incluido no release publico (contem URL interna corporativa)
          # A TI deve gerar o ZIP de distribuicao internamente usando Build.bat

          $zipName = "CorporateWallpaperAgent-${{ steps.version.outputs.TAG }}.zip"
          Compress-Archive -Path "$distDir\*" -DestinationPath $zipName -Force
          Write-Host "ZIP criado: $zipName"

      - name: Criar Release no GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: "Corporate Wallpaper Agent ${{ steps.version.outputs.TAG }}"
          body: |
            ## Corporate Wallpaper Agent ${{ steps.version.outputs.TAG }}

            ### Atencao — Distribuicao Interna (TI)
            Este ZIP **nao contem** o `config.txt` com a URL do servidor corporativo.
            Para gerar o pacote completo de distribuicao aos colaboradores, use o `Build.bat` internamente.

            ### Instalacao (apos incluir o config.txt)
            1. Baixe e extraia o `.zip`
            2. Adicione o `config.txt` com a URL do servidor
            3. De duplo clique em `CLIQUE AQUI PARA INSTALAR.bat`
            4. Pronto — o papel de parede sera atualizado automaticamente

            ### Diagnostic (se algo der errado)
            Execute o `WallpaperDiagnostic.ps1` e envie o arquivo gerado para o TI.

            ### Desinstalacao
            Rode o `Uninstall.bat` que esta dentro do ZIP.

            ---
            _Release gerado automaticamente via GitHub Actions._
          files: |
            CorporateWallpaperAgent-${{ steps.version.outputs.TAG }}.zip
          draft: false
          prerelease: false

